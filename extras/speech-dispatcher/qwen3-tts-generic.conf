# Speech Dispatcher Generic module config for local Qwen3-TTS
#
# Copy this to:
#   ~/.config/speech-dispatcher/modules/qwen3-tts.conf
# Then enable it from speechd.conf using AddModule.

Debug 0
GenericDebug 0

# Update this path if your repo lives elsewhere.
GenericExecuteSynth "printf %s '$DATA' | /home/john/git-projects/Qwen3-TTS/extras/speech-dispatcher/qwen3-tts-speechd.sh"
GenericCmdDependency "/home/john/anaconda3/envs/qwen3-tts/bin/python"
GenericStripPunctChars "'\"`$\\;|&<>"

# Define voices exposed to clients (mapped in qwen3-tts-speechd.sh/provider).
# Syntax: AddVoice "<lang>" "<SPD voice>" "<code>"
AddVoice "en" "MALE1" "male1"
AddVoice "en" "FEMALE1" "female1"
AddVoice "en" "FEMALE2" "female2"

DefaultVoice "male1"
